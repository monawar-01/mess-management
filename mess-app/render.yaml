services:
  - type: web
    name: mess-management
    env: node
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /opt/render/project/src/backend/mess.db
      - key: FRONTEND_URL
        value: https://mess-management.onrender.com
